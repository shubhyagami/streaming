<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Poweramp</title>
    <link rel="stylesheet" href="/css/poweramp.css">
</head>
<body>
<div id="app">
    <div id="navbar">
        <button class="nav-btn" data-nav="lib" onclick="navigateTo('/library')">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Library</span>
        </button>
        <button class="nav-btn active" data-nav="eq" onclick="navigateTo('/equalizer')">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
            <span>Equalizer</span>
        </button>
        <button class="nav-btn" data-nav="player" onclick="navigateTo('/player')">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <span>Player</span>
        </button>
        <button class="nav-btn" data-nav="search" onclick="navigateTo('/presets')">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Presets</span>
        </button>
        <button class="nav-btn" onclick="navigateTo('/')">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span>More</span>
        </button>
    </div>

    <div id="content" th:replace="${content}">
    </div>

    <div id="status-bar">
        <div id="status-content">
            <span id="status-text">Poweramp DSP Server</span>
            <span id="status-dsp">DSP: Ready</span>
        </div>
    </div>
</div>

<script src="/js/poweramp.js"></script>
</body>
</html>
